name: newapi-checkin

# on:
#   schedule:
#     - cron: '23 0 * * *'
on:
  workflow_dispatch:

jobs:
  newapi-checkin:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - run: node scripts/newapi-checkin.js
        env:
          NEWAPI_COOKIE: ${{ secrets.NEWAPI_COOKIE }}
          NEWAPI_USER: ${{ secrets.NEWAPI_USER }}
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
