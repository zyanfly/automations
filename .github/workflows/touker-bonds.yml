name: Touker Bonds Check

on:
  schedule:
    # 每天北京时间 09:00 (UTC 01:00)
    - cron: '33 23 * * *'
  workflow_dispatch:

jobs:
  check-bonds:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Script
        env:
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
        run: node scripts/touker-bonds.js

      - name: Commit and Push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: 更新打新历史记录'
          file_pattern: 'scripts/bonds-history.json'
