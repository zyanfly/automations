name: Touker Bonds Check

on:
  schedule:
    # 每天北京时间 09:00 (UTC 01:00)
    - cron: '33 22 * * *'
  workflow_dispatch:

jobs:
  check-bonds:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Script
        env:
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
        run: node scripts/touker-bonds.js
